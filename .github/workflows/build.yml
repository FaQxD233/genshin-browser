name: Build Genshin Browser

on:
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: '版本号 (必填，例如: v0.2.1)'
        required: true
        default: 'v0.2.1'
      create_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # 允许创建 Release 和上传文件

    steps:
    - name: Checkout 代码
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 还原依赖
      run: dotnet restore GenshinBrowser.csproj

    - name: 编译 win-x64 自包含版本
      run: |
        dotnet publish GenshinBrowser.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=false `
          -p:PublishTrimmed=false `
          -o dist/win-x64-self-contained

    - name: 生成版本信息文件
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $buildTime = Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
        $commitSha = "${{ github.sha }}"
        $branchName = "${{ github.ref_name }}"

        $info = "Genshin Browser - Windows x64 自包含版本`n"
        $info += "版本: $version`n"
        $info += "编译时间: $buildTime`n"
        $info += "提交: $commitSha`n"
        $info += "分支: $branchName"

        $info | Out-File -FilePath dist/win-x64-self-contained/VERSION.txt -Encoding UTF8
        Write-Host "版本信息已生成:"
        Write-Host $info

    - name: 打包构建产物
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $zipName = "GenshinBrowser-$version-win-x64.zip"

        Compress-Archive -Path dist/win-x64-self-contained/* -DestinationPath $zipName
        Write-Host "已打包到: $zipName"

        # 输出文件大小
        $size = [math]::Round((Get-Item $zipName).Length / 1MB, 2)
        Write-Host "压缩包大小: $size MB"

        # 保存文件名供后续步骤使用
        echo "RELEASE_ZIP=$zipName" >> $env:GITHUB_ENV

    - name: 上传构建产物 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: GenshinBrowser-${{ github.event.inputs.version }}-win-x64
        path: |
          dist/win-x64-self-contained/*
          !dist/win-x64-self-contained/*.pdb
        retention-days: 90

    - name: 创建 GitHub Release
      if: github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Genshin Browser ${{ github.event.inputs.version }}
        body: |
          ## 🎮 Genshin Browser ${{ github.event.inputs.version }}

          专为 B 站原神攻略视频设计的 Windows 浮窗浏览器

          ### 📦 下载说明

          下载 `GenshinBrowser-${{ github.event.inputs.version }}-win-x64.zip`，解压后运行 `GenshinBrowser.exe`

          **系统要求:**
          - Windows 10/11
          - Edge WebView2 Runtime (Windows 11 自带)

          ### ✨ 核心功能

          - **固定模式**: 窗口置顶，锁定位置，游戏时使用
          - **全局快捷键**: `K` 键控制视频播放/暂停，`F8` 切换固定/自由模式
          - **登录态保留**: B 站登录状态永久保存
          - **收藏夹**: 一键收藏，支持搜索
          - **浏览历史**: 自动记录，支持搜索

          ### 🔧 本次更新

          - 控制窗口引入轻量 MVVM，降低界面与浏览器逻辑耦合
          - 新增 Toast 非阻塞提示和本地日志文件（`%LocalAppData%\GenshinBrowser\logs\`）
          - 替换 emoji 图标为稳定的 Segoe MDL2 图标字形
          - 新增按钮、Toast、控制窗口显示等 WPF 过渡动画
          - 修复列表同 URL 信息刷新、右键菜单命中项、控制窗口防抖保存重复订阅问题

          ---

          **编译信息:**
          - 提交: `${{ github.sha }}`
          - 分支: `${{ github.ref_name }}`
          - 编译时间: `${{ github.run_id }}`
        files: |
          ${{ env.RELEASE_ZIP }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 构建摘要
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $createRelease = "${{ github.event.inputs.create_release }}"

        Write-Host "✅ 构建完成！"
        Write-Host "📦 版本: $version"
        Write-Host ""

        if ($createRelease -eq "true") {
          Write-Host "🎉 GitHub Release 已创建"
          Write-Host "🔗 下载链接: https://github.com/${{ github.repository }}/releases/tag/$version"
        } else {
          Write-Host "📥 Artifacts 已上传"
          Write-Host "🔗 下载链接: 请在 Actions 的 Artifacts 中下载"
        }

        Write-Host ""
        Write-Host "包含文件:"
        Get-ChildItem dist/win-x64-self-contained -File | Select-Object Name, @{Name='Size (KB)';Expression={[math]::Round($_.Length/1KB,2)}} | Format-Table -AutoSize
